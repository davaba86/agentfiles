version: 2

project_name: agentfiles

before:
  hooks:
    - go mod tidy

builds:
  - id: agentfiles
    main: ./cmd/agentfiles
    binary: agentfiles
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: agentfiles
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: agentfiles
    repository:
      owner: davaba86
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/davaba86/agentfiles
    description: Standardize AI coding-agent instruction files across repositories
    license: MIT
    test: |
      assert_match version.to_s, shell_output("#{bin}/agentfiles version")
